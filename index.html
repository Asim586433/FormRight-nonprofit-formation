<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormRight · nonprofit formation platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background-color: #f8fafc;
            color: #0f172a;
            line-height: 1.5;
        }
        .card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
            padding: 1.8rem;
            transition: all 0.2s;
        }
        .btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 6px -2px rgba(37,99,235,0.2);
            transition: background 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn:hover {
            background-color: #1e40af;
        }
        .btn-outline {
            background: transparent;
            color: #2563eb;
            border: 1px solid #2563eb;
            box-shadow: none;
        }
        .btn-outline:hover {
            background: #e6f0ff;
        }
        .btn-sm {
            padding: 0.4rem 1rem;
            font-size: 0.9rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 1rem;
            background: white;
            transition: 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }
        label {
            font-weight: 500;
            margin-bottom: 0.4rem;
            display: inline-block;
            color: #334155;
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }
        .flex { display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap: 2rem; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 1.5rem; }
        .text-center { text-align: center; }
        .mt-6 { margin-top: 4rem; }
        .mb-2 { margin-bottom: 1rem; }
        .shadow-soft { box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }

        /* layout */
        .app-header { background: white; border-bottom: 1px solid #e9eef2; padding: 0.8rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
        .logo { font-size: 1.8rem; font-weight: 700; color: #2563eb; letter-spacing: -0.02em; }
        .badge { background: #dbeafe; color: #1e40af; padding: 0.3rem 0.9rem; border-radius: 30px; font-size: 0.9rem; font-weight: 500; }

        /* dashboard layout */
        .dash-wrapper { display: flex; min-height: 85vh; background: #f8fafc; }
        .sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; padding: 2rem 1rem; }
        .sidebar a { display: block; padding: 0.9rem 1.2rem; border-radius: 1rem; color: #334155; text-decoration: none; font-weight: 500; margin-bottom: 0.3rem; transition: 0.1s; cursor: pointer; }
        .sidebar a.active { background: #dbeafe; color: #1e40af; font-weight: 600; }
        .sidebar a:hover { background: #f1f5f9; }
        .main-content { flex: 1; padding: 2rem; overflow-x: auto; }

        /* step forms */
        .step-indicator { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 2.5rem; flex-wrap: wrap; }
        .step { background: white; border-radius: 40px; padding: 0.5rem 1.5rem; border: 1px solid #cbd5e1; color: #475569; }
        .step.active { background: #2563eb; color: white; border-color: #2563eb; }

        .pricing-card { background: white; border-radius: 2rem; padding: 2rem; box-shadow: 0 12px 30px rgba(0,0,0,0.03); }
        .price { font-size: 2.2rem; font-weight: 700; color: #0f172a; }

        /* stat bars */
        .stat-bar { display: flex; align-items: center; gap: 1rem; margin: 1rem 0; }
        .bar-fill { height: 1rem; background: #2563eb; border-radius: 30px; }

        /* modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; z-index: 999; }
        .modal-card { background: white; border-radius: 2rem; padding: 2rem; max-width: 450px; width: 90%; }

        /* table */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 1.5rem; overflow: hidden; box-shadow: 0 4px 8px #e2e8f0; }
        th { text-align: left; padding: 1rem 1.2rem; background: #f1f5f9; }
        td { padding: 1rem 1.2rem; border-bottom: 1px solid #e2e8f0; }

        /* tabs */
        .admin-tab-content { display: none; }
        .admin-tab-content.active { display: block; }
        .client-tab-content { display: none; }
        .client-tab-content.active { display: block; }

        @media (max-width: 700px) { .dash-wrapper { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
<div id="root" class="app-root">Loading FormRight...</div>

<!-- email modal -->
<div id="emailModal" class="modal">
    <div class="modal-card">
        <h3>📧 Email simulation</h3>
        <p id="emailModalContent">Payment success email with receipt & dashboard access</p>
        <button class="btn" onclick="document.getElementById('emailModal').style.display='none'">Close</button>
    </div>
</div>

<script>
(function() {
    // ---------- INIT STORAGE WITH DUMMY DATA ----------
    function initStorage() {
        if (!localStorage.getItem('registrations')) {
            const dummyReg = [
                { id: 'R001', orgName: 'Helping Paws', state: 'CA', email: 'paws@example.com', phone: '555-1234', plan: 'DIY Document Pack — $149', paymentStatus: 'paid', board: ['Alice','Bob','Carol'], founder: 'Alice Smith', founderEmail: 'alice@example.com', mission: 'Animal welfare', createdAt: new Date().toISOString() },
                { id: 'R002', orgName: 'Green Future', state: 'NY', email: 'green@future.org', phone: '555-5678', plan: 'Full-Service 1023-EZ — $1,199', paymentStatus: 'paid', board: ['David','Eva','Frank'], founder: 'David Jones', founderEmail: 'david@example.com', mission: 'Environmental education', createdAt: new Date().toISOString() }
            ];
            localStorage.setItem('registrations', JSON.stringify(dummyReg));
        }
        if (!localStorage.getItem('contacts')) {
            localStorage.setItem('contacts', JSON.stringify([
                { name: 'Jane Doe', email: 'jane@mail.com', subject: 'Pricing question', message: 'Need group discount for multiple nonprofits', date: new Date().toISOString() },
                { name: 'John Smith', email: 'john@example.com', subject: 'Support', message: 'How do I add board members?', date: new Date().toISOString() }
            ]));
        }
        if (!localStorage.getItem('payments')) {
            localStorage.setItem('payments', JSON.stringify([
                { id: 'pay_1', amount: 149, plan: 'DIY Document Pack', email: 'paws@example.com', date: new Date().toISOString() }
            ]));
        }
        if (!localStorage.getItem('documents')) {
            localStorage.setItem('documents', JSON.stringify([]));
        }
    }
    initStorage();

    // current onboarding data
    let onboardingData = {
        step: 1,
        orgName: '', state: '', orgEmail: '', phone: '',
        is501c3: 'yes', purpose: 'animal welfare', revenue: '<50000',
        founderName: '', founderAddress: '', founderEmail: '',
        boardMembers: ['', '', ''],
        mission: '', category: 'Education',
        selectedPlan: 'DIY Document Pack — $149'
    };

    // state
    let currentView = 'marketing'; // marketing | onboarding | client-dash | admin-dash
    let adminAuthenticated = false;
    let clientAuthenticated = false; // simple simulation after payment
    let currentClientEmail = null;

    // dashboard tab tracking
    let activeClientTab = 'overview';
    let activeAdminTab = 'dashboard';

    function setView(view) {
        currentView = view;
        if (view === 'client-dash') clientAuthenticated = true;
        renderApp();
    }

    // ---------- RENDER ----------
    window.renderApp = function() {
        const root = document.getElementById('root');
        if (!root) return;

        if (currentView === 'marketing') root.innerHTML = renderMarketing();
        else if (currentView === 'onboarding') root.innerHTML = renderOnboarding();
        else if (currentView === 'client-dash') {
            if (!clientAuthenticated) {
                // quick login simulation: use latest reg email
                const regs = JSON.parse(localStorage.getItem('registrations') || '[]');
                if (regs.length > 0) currentClientEmail = regs[0].email;
                else currentClientEmail = 'client@demo.org';
            }
            root.innerHTML = renderClientDashboard();
        }
        else if (currentView === 'admin-dash') {
            if (!adminAuthenticated) root.innerHTML = renderAdminLogin();
            else root.innerHTML = renderAdminDashboard();
        }
        attachEvents();
    };

    // ---------- EVENT HANDLER ATTACH ----------
    function attachEvents() {
        // MARKETING: pricing plan buttons
        document.querySelectorAll('.btn-start-onboarding').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const plan = e.target.dataset.plan || 'DIY Document Pack — $149';
                onboardingData.selectedPlan = plan;
                onboardingData.step = 1;
                setView('onboarding');
            });
        });

        // HEADER NAVIGATION
        const homeBtn = document.getElementById('homeBtn');
        if (homeBtn) homeBtn.addEventListener('click', () => setView('marketing'));
        
        const adminNavBtn = document.getElementById('adminNavBtn');
        if (adminNavBtn) adminNavBtn.addEventListener('click', () => setView('admin-dash'));
        
        const clientNavBtn = document.getElementById('clientNavBtn');
        if (clientNavBtn) clientNavBtn.addEventListener('click', () => setView('client-dash'));

        // ADMIN LOGIN
        const adminLoginBtn = document.getElementById('adminLoginBtn');
        if (adminLoginBtn) {
            adminLoginBtn.addEventListener('click', () => {
                const email = document.getElementById('adminEmail')?.value;
                const pass = document.getElementById('adminPass')?.value;
                if (email === 'admin@rightform.org' && pass === 'admin123') {
                    adminAuthenticated = true;
                    setView('admin-dash');
                } else {
                    alert('Invalid credentials (use admin@rightform.org / admin123)');
                }
            });
        }

        // LOGOUT BUTTONS
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                adminAuthenticated = false;
                clientAuthenticated = false;
                currentClientEmail = null;
                setView('marketing');
            });
        }
        const clientLogout = document.getElementById('clientLogout');
        if (clientLogout) {
            clientLogout.addEventListener('click', () => {
                clientAuthenticated = false;
                setView('marketing');
            });
        }

        // ONBOARDING STEP NAVIGATION
        const nextStepBtn = document.getElementById('nextStep');
        const prevStepBtn = document.getElementById('prevStep');
        
        if (nextStepBtn) {
            nextStepBtn.addEventListener('click', () => {
                if (!validateStep(onboardingData.step)) return;
                if (onboardingData.step < 6) {
                    onboardingData.step++;
                    renderApp();
                } else if (onboardingData.step === 6) {
                    processPaymentAndRegister();
                }
            });
        }
        
        if (prevStepBtn) {
            prevStepBtn.addEventListener('click', () => {
                if (onboardingData.step > 1) {
                    onboardingData.step--;
                    renderApp();
                }
            });
        }

        // ONBOARDING INPUTS
        document.querySelectorAll('.onboarding-input').forEach(inp => {
            inp.addEventListener('input', (e) => {
                const field = e.target.dataset.field;
                if (field) onboardingData[field] = e.target.value;
            });
        });
        
        document.querySelectorAll('.board-input').forEach(inp => {
            inp.addEventListener('input', (e) => {
                const idx = e.target.dataset.idx;
                if (idx !== undefined) onboardingData.boardMembers[idx] = e.target.value;
            });
        });

        // ADD BOARD MEMBER
        const addBoardBtn = document.getElementById('addBoardBtn');
        if (addBoardBtn) {
            addBoardBtn.addEventListener('click', () => {
                onboardingData.boardMembers.push('');
                renderApp();
            });
        }

        // CONTACT FORM
        const contactForm = document.getElementById('contactForm');
        if (contactForm) {
            contactForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('contactName')?.value;
                const email = document.getElementById('contactEmail')?.value;
                const subj = document.getElementById('contactSubject')?.value;
                const msg = document.getElementById('contactMsg')?.value;
                if (!name || !email || !subj || !msg) return alert('Please fill all fields');
                
                const contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
                contacts.push({ name, email, subject: subj, message: msg, date: new Date().toISOString() });
                localStorage.setItem('contacts', JSON.stringify(contacts));
                alert('Message sent! We\'ll get back to you soon.');
                contactForm.reset();
            });
        }

        // DOCUMENT DOWNLOADS
        document.querySelectorAll('.download-doc').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const docName = e.target.dataset.doc || 'document';
                const regs = JSON.parse(localStorage.getItem('registrations') || '[]');
                const sample = regs[0] || { orgName: 'YourOrg', founder: 'Founder', mission: 'Our mission' };
                const content = `=== ${docName} ===\nOrganization: ${sample.orgName}\nFounder: ${sample.founder || 'N/A'}\nBoard Members: ${sample.board ? sample.board.join(', ') : '3 members'}\nMission: ${sample.mission || 'sample'}\nState: ${sample.state || 'CA'}\n\n[This is a simulated .docx file for demonstration]`;
                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = docName.replace(/ /g,'_') + '.txt';
                a.click();
                URL.revokeObjectURL(url);
            });
        });

        // CLIENT DASHBOARD SIDEBAR TABS
        document.querySelectorAll('.client-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                const tabId = e.target.dataset.tab;
                if (tabId) {
                    activeClientTab = tabId;
                    // update active class
                    document.querySelectorAll('.client-tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    document.querySelectorAll('.client-tab-content').forEach(c => c.classList.remove('active'));
                    const contentEl = document.getElementById(`client-tab-${tabId}`);
                    if (contentEl) contentEl.classList.add('active');
                }
            });
        });

        // ADMIN DASHBOARD SIDEBAR TABS
        document.querySelectorAll('.admin-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                const tabId = e.target.dataset.tab;
                if (tabId) {
                    activeAdminTab = tabId;
                    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    document.querySelectorAll('.admin-tab-content').forEach(c => c.classList.remove('active'));
                    const contentEl = document.getElementById(`admin-tab-${tabId}`);
                    if (contentEl) contentEl.classList.add('active');
                    
                    // refresh dynamic tables
                    if (tabId === 'messages') loadAdminMessages();
                    if (tabId === 'registrations') loadRegistrationsTable();
                }
            });
        });

        // load dynamic content functions
        function loadAdminMessages() {
            const tbody = document.getElementById('adminMessagesBody');
            if (tbody) {
                const msgs = JSON.parse(localStorage.getItem('contacts') || '[]');
                tbody.innerHTML = msgs.map(m => `<tr><td>${m.name}</td><td>${m.email}</td><td>${m.subject}</td><td>${m.message.substring(0,30)}...</td><td>${new Date(m.date).toLocaleDateString()}</td></tr>`).join('');
            }
        }
        
        function loadRegistrationsTable() {
            const tbody = document.getElementById('registrationsTableBody');
            if (tbody) {
                const regs = JSON.parse(localStorage.getItem('registrations') || '[]');
                tbody.innerHTML = regs.map(r => `<tr><td>${r.id}</td><td>${r.orgName}</td><td>${r.state}</td><td>${r.plan}</td><td>${r.paymentStatus}</td><td>${new Date(r.createdAt).toLocaleDateString()}</td></tr>`).join('');
            }
        }

        // load admin tables if visible
        if (currentView === 'admin-dash' && adminAuthenticated) {
            loadAdminMessages();
            loadRegistrationsTable();
            
            // pipeline counts
            const regs = JSON.parse(localStorage.getItem('registrations') || '[]');
            document.getElementById('pipelineNew') && (document.getElementById('pipelineNew').innerText = regs.filter(r => r.paymentStatus === 'pending').length);
            document.getElementById('pipelinePaid') && (document.getElementById('pipelinePaid').innerText = regs.filter(r => r.paymentStatus === 'paid').length);
        }
    }

    function validateStep(step) {
        if (step === 1) {
            if (!onboardingData.orgName || !onboardingData.state || !onboardingData.orgEmail) {
                alert('Please fill all basic fields');
                return false;
            }
        }
        if (step === 3) {
            if (!onboardingData.founderName || !onboardingData.founderEmail) {
                alert('Founder details required');
                return false;
            }
        }
        if (step === 4) {
            const filled = onboardingData.boardMembers.filter(b => b.trim() !== '').length;
            if (filled < 3) {
                alert('Please add at least 3 board members');
                return false;
            }
        }
        return true;
    }

    function processPaymentAndRegister() {
        const cardInput = document.getElementById('cardNumber');
        const cardNumber = cardInput ? cardInput.value.replace(/\s/g,'') : '';
        
        if (cardNumber !== '4242424242424242') {
            alert('Please use test card: 4242 4242 4242 4242');
            return;
        }

        const regId = 'REG' + Math.floor(Math.random()*10000);
        const registration = {
            id: regId,
            orgName: onboardingData.orgName,
            state: onboardingData.state,
            email: onboardingData.orgEmail,
            phone: onboardingData.phone,
            founder: onboardingData.founderName,
            founderEmail: onboardingData.founderEmail,
            board: onboardingData.boardMembers.filter(b => b.trim() !== ''),
            mission: onboardingData.mission || 'Not specified',
            plan: onboardingData.selectedPlan,
            paymentStatus: 'paid',
            createdAt: new Date().toISOString()
        };

        const registrations = JSON.parse(localStorage.getItem('registrations') || '[]');
        registrations.push(registration);
        localStorage.setItem('registrations', JSON.stringify(registrations));

        // show email simulation
        document.getElementById('emailModalContent').innerHTML = 
            `<strong>To:</strong> ${onboardingData.orgEmail}<br>
             <strong>Subject:</strong> Welcome to FormRight!<br><br>
             <strong>Receipt:</strong> Payment of ${onboardingData.selectedPlan} received.<br>
             <strong>Dashboard Access:</strong> You can now log in to your client dashboard.<br><br>
             <em>This is a simulated email.</em>`;
        document.getElementById('emailModal').style.display = 'flex';

        // auto-hide after 4 seconds and go to dashboard
        setTimeout(() => {
            document.getElementById('emailModal').style.display = 'none';
            currentClientEmail = onboardingData.orgEmail;
            clientAuthenticated = true;
            setView('client-dash');
        }, 4000);
    }

    // ---------- RENDER FUNCTIONS ----------
    function renderMarketing() {
        return `
        <div>
            <header class="app-header">
                <span class="logo" style="cursor:pointer;" onclick="setView('marketing')">FormRight</span>
                <div>
                    <button class="btn-outline btn-sm" id="adminNavBtn">Admin</button>
                    <button class="btn-outline btn-sm" id="clientNavBtn">Client Dashboard</button>
                    <button class="btn btn-sm" onclick="setView('onboarding')">Start Nonprofit</button>
                </div>
            </header>
            
            <section class="container text-center" style="padding: 4rem 2rem;">
                <h1 style="font-size: 3.5rem; font-weight: 800; letter-spacing: -0.02em;">Start Your Nonprofit <span style="color:#2563eb">in Minutes</span></h1>
                <p style="font-size: 1.3rem; color: #334155; max-width: 700px; margin: 1.5rem auto;">FormRight helps founders create compliant nonprofits quickly and affordably.</p>
                <button class="btn" style="padding: 1rem 3rem; font-size: 1.2rem;" onclick="setView('onboarding')">Get Started →</button>
            </section>

            <div class="container">
                <h2 class="text-center mb-2">How It Works</h2>
                <div class="grid-3 text-center">
                    <div class="card"><h3>1. Complete onboarding</h3><p>6 simple steps</p></div>
                    <div class="card"><h3>2. Make payment</h3><p>Secure & simple</p></div>
                    <div class="card"><h3>3. Get documents</h3><p>Instant download</p></div>
                </div>
            </div>

            <div class="container mt-6">
                <h2 class="text-center mb-2">Pricing Plans</h2>
                <div class="grid-4">
                    <div class="card"><h3>📄 DIY Document Pack</h3><p class="price">$149</p><button class="btn-start-onboarding btn" data-plan="DIY Document Pack — $149">Select</button></div>
                    <div class="card"><h3>🤝 Done-With-You</h3><p class="price">$499</p><button class="btn-start-onboarding btn" data-plan="Done-With-You Formation — $499">Select</button></div>
                    <div class="card"><h3>⚡ Full 1023-EZ</h3><p class="price">$1,199</p><button class="btn-start-onboarding btn" data-plan="Full-Service 1023-EZ — $1,199">Select</button></div>
                    <div class="card"><h3>🏛 Full Form 1023</h3><p class="price">$3,500</p><button class="btn-start-onboarding btn" data-plan="Full Form 1023 — $3,500">Select</button></div>
                    <div class="card"><h3>📬 Registered Agent</h3><p class="price">$129/yr</p><button class="btn-start-onboarding btn" data-plan="Registered Agent — $129/year">Select</button></div>
                    <div class="card"><h3>⏰ Compliance</h3><p class="price">$49/yr</p><button class="btn-start-onboarding btn" data-plan="Compliance Reminders — $49/year">Select</button></div>
                    <div class="card"><h3>🎓 Board Training</h3><p class="price">$199</p><button class="btn-start-onboarding btn" data-plan="Board Training — $199">Select</button></div>
                </div>
            </div>

            <div class="container mt-6">
                <h2>Frequently Asked Questions</h2>
                <div class="card mt-6"><strong>How long does formation take?</strong> — Typically 1-2 weeks for document generation.</div>
                <div class="card"><strong>What's included?</strong> — All necessary IRS and state documents.</div>
            </div>

            <div class="container mt-6">
                <h2>Contact Us</h2>
                <form id="contactForm" class="card" style="max-width:600px;">
                    <label>Name</label><input id="contactName" required>
                    <label>Email</label><input id="contactEmail" type="email" required>
                    <label>Subject</label><input id="contactSubject" required>
                    <label>Message</label><textarea id="contactMsg" rows="3" required></textarea>
                    <button class="btn" type="submit">Send Message</button>
                </form>
            </div>
            
            <footer class="container" style="padding:2rem; text-align:center;">© 2026 FormRight — All rights reserved</footer>
        </div>`;
    }

    function renderOnboarding() {
        const s = onboardingData.step;
        let stepHtml = '';
        
        if (s===1) stepHtml = `
            <h3>Step 1: Organization Basics</h3>
            <label>Organization Name</label><input class="onboarding-input" data-field="orgName" value="${onboardingData.orgName}" placeholder="e.g., Helping Hands">
            <label>State</label><input class="onboarding-input" data-field="state" value="${onboardingData.state}" placeholder="California">
            <label>Email</label><input class="onboarding-input" data-field="orgEmail" value="${onboardingData.orgEmail}" type="email" placeholder="org@example.com">
            <label>Phone</label><input class="onboarding-input" data-field="phone" value="${onboardingData.phone}" placeholder="(555) 123-4567">`;
        
        if (s===2) stepHtml = `
            <h3>Step 2: Eligibility Screening</h3>
            <label>Are you forming a 501(c)(3)?</label>
            <select class="onboarding-input" data-field="is501c3">
                <option ${onboardingData.is501c3==='yes'?'selected':''}>yes</option>
                <option ${onboardingData.is501c3==='no'?'selected':''}>no</option>
            </select>
            <label>Charitable purpose</label>
            <input class="onboarding-input" data-field="purpose" value="${onboardingData.purpose}">
            <label>Expected first-year revenue</label>
            <select class="onboarding-input" data-field="revenue">
                <option ${onboardingData.revenue==='<50000'?'selected':''}>Less than $50k</option>
                <option ${onboardingData.revenue==='50000-200k'?'selected':''}>$50k - $200k</option>
            </select>`;
        
        if (s===3) stepHtml = `
            <h3>Step 3: Founder Information</h3>
            <label>Full name</label><input class="onboarding-input" data-field="founderName" value="${onboardingData.founderName}">
            <label>Address</label><input class="onboarding-input" data-field="founderAddress" value="${onboardingData.founderAddress}">
            <label>Email</label><input class="onboarding-input" data-field="founderEmail" value="${onboardingData.founderEmail}" type="email">`;
        
        if (s===4) {
            let boardInputs = '';
            onboardingData.boardMembers.forEach((name, idx) => {
                boardInputs += `<label>Board member ${idx+1}</label><input class="board-input" data-idx="${idx}" value="${name}" placeholder="Full name">`;
            });
            stepHtml = `<h3>Step 4: Board Members (minimum 3)</h3>${boardInputs}
                <button class="btn-outline btn-sm" id="addBoardBtn" type="button">+ Add another member</button>`;
        }
        
        if (s===5) stepHtml = `
            <h3>Step 5: Organization Details</h3>
            <label>Mission statement</label>
            <input class="onboarding-input" data-field="mission" value="${onboardingData.mission}" placeholder="Our mission is...">
            <label>Category (e.g., Education, Health)</label>
            <input class="onboarding-input" data-field="category" value="${onboardingData.category}">`;
        
        if (s===6) stepHtml = `
            <h3>Step 6: Payment</h3>
            <div class="card" style="background:#f0f9ff;">Selected plan: <strong>${onboardingData.selectedPlan}</strong></div>
            <label>Card number (test: 4242 4242 4242 4242)</label>
            <input id="cardNumber" placeholder="4242 4242 4242 4242" value="4242 4242 4242 4242">
            <div class="flex">
                <div style="flex:1"><label>Expiry</label><input placeholder="MM/YY" value="12/30"></div>
                <div style="flex:1"><label>CVV</label><input placeholder="123" value="123"></div>
            </div>
            <p class="badge">Test mode — no real charges</p>`;

        return `
        <div class="app-header">
            <span class="logo" onclick="setView('marketing')" style="cursor:pointer;">FormRight</span>
            <button class="btn-outline btn-sm" onclick="setView('marketing')">Exit</button>
        </div>
        <div class="container" style="max-width:700px;">
            <div class="step-indicator">
                ${[1,2,3,4,5,6].map(i => `<span class="step ${i===s?'active':''}">Step ${i}</span>`).join('')}
            </div>
            <div class="card">
                ${stepHtml}
                <div style="display:flex;justify-content:space-between;margin-top:2rem;">
                    <button class="btn-outline" id="prevStep" ${s===1?'disabled':''}>Previous</button>
                    <button class="btn" id="nextStep">${s===6?'Complete Payment':'Next Step'}</button>
                </div>
            </div>
        </div>`;
    }

                <div id="client-tab-details" class="client-tab-content ${activeClientTab==='details'?'active':''}">

                <div id="client-tab-board" class="client-tab-content ${activeClientTab==='board'?'active':''}">

                        <tr><th>Date</th><th>Plan</th><th>Amount</th><th>Status</th></tr>

                <h2 class="text-center">Admin Login</h2>
                <label>Email</label>
                <input id="adminEmail" value="admin@rightform.org">
                <label>Password</label>
                <input id="adminPass" type="password" value="admin123">
                <button class="btn" id="adminLoginBtn" style="margin-top:1.5rem; width:100%;">Sign In</button>
                <p class="text-center" style="margin-top:1rem;"><small>Use demo credentials above</small></p>
            </div>
        </div>`;
    }

    function renderAdminDashboard() {
        const regs = JSON.parse(localStorage.getItem('registrations') || '[]');
        const contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
        const revenue = regs.reduce((sum, r) => {
            if (r.plan.includes('149')) return sum + 149;
            if (r.plan.includes('499')) return sum + 499;
            if (r.plan.includes('1,199') || r.plan.includes('1199')) return sum + 1199;
            return sum + 500;
        }, 0);

        return `
        <div class="app-header">
            <span class="logo">Admin Portal</span>
            <button class="btn-outline btn-sm" id="logoutBtn">Logout</button>
        </div>
        <div class="dash-wrapper">
            <div class="sidebar">
                <a class="admin-tab ${activeAdminTab==='dashboard'?'active':''}" data-tab="dashboard">📊 Dashboard</a>
                <a class="admin-tab ${activeAdminTab==='registrations'?'active':''}" data-tab="registrations">📋 Registrations</a>
                <a class="admin-tab ${activeAdminTab==='pipeline'?'active':''}" data-tab="pipeline">🔄 Pipeline</a>
                <a class="admin-tab ${activeAdminTab==='payments'?'active':''}" data-tab="payments">💳 Payments</a>
                <a class="admin-tab ${activeAdminTab==='messages'?'active':''}" data-tab="messages">✉️ Messages</a>
                <a class="admin-tab ${activeAdminTab==='analytics'?'active':''}" data-tab="analytics">📈 Analytics</a>
            </div>
            <div class="main-content">
                <!-- Dashboard Tab -->
                <div id="admin-tab-dashboard" class="admin-tab-content ${activeAdminTab==='dashboard'?'active':''}">
                    <h2>Admin Dashboard</h2>
                    <div class="grid-3">
                        <div class="card"><h3>Total Registrations</h3><p style="font-size:2rem;">${regs.length}</p></div>
                        <div class="card"><h3>Total Revenue</h3><p style="font-size:2rem;">$${revenue}</p></div>
                        <div class="card"><h3>Contact Messages</h3><p style="font-size:2rem;">${contacts.length}</p></div>
                    </div>
                </div>
                
                <!-- Registrations Tab -->
                <div id="admin-tab-registrations" class="admin-tab-content ${activeAdminTab==='registrations'?'active':''}">
                    <h2>All Registrations</h2>
                    <table>
                        <thead><tr><th>ID</th><th>Organization</th><th>State</th><th>Plan</th><th>Status</th><th>Date</th></tr></thead>
                        <tbody id="registrationsTableBody"></tbody>
                    </table>
                </div>
                
                <!-- Pipeline Tab -->
                <div id="admin-tab-pipeline" class="admin-tab-content ${activeAdminTab==='pipeline'?'active':''}">
                    <h2>Pipeline Board</h2>
                    <div class="grid-4">
                        <div class="card"><h3>🆕 New Intake</h3><p id="pipelineNew">0</p></div>
                        <div class="card"><h3>💳 Payment Received</h3><p id="pipelinePaid">${regs.filter(r => r.paymentStatus === 'paid').length}</p></div>
                        <div class="card"><h3>📄 Documents Generated</h3><p>${regs.length}</p></div>
                        <div class="card"><h3>✅ Completed</h3><p>${Math.floor(regs.length/2)}</p></div>
                    </div>
                </div>
                
                <!-- Payments Tab -->
                <div id="admin-tab-payments" class="admin-tab-content ${activeAdminTab==='payments'?'active':''}">
                    <h2>Payment History</h2>
                    <table>
                        <tr><th>ID</th><th>Amount</th><th>Plan</th><th>Email</th></tr>
                        ${regs.map(r => `<tr><td>${r.id}</td><td>${r.plan.includes('149')?'$149':r.plan.includes('499')?'$499':'$1,199'}</td><td>${r.plan}</td><td>${r.email}</td></tr>`).join('')}

                <!-- Messages Tab -->

                </div>
                
                <!-- Analytics Tab -->
                <div id="admin-tab-analytics" class="admin-tab-content ${activeAdminTab==='analytics'?'active':''}">

                    <div class="card">
                        <h3>Popular Plans</h3>
                        <div class="stat-bar">DIY: <div class="bar-fill" style="width:60%;">60%</div></div>
                        <div class="stat-bar">Done-With-You: <div class="bar-fill" style="width:25%;">25%</div></div>
                        <div class="stat-bar">Full 1023-EZ: <div class="bar-fill" style="width:15%;">15%</div></div>
                    </div>
                    <div class="card mt-6">

                        <p>Last month: ${Math.max(1, regs.length-1)} registrations</p>
                    </div>
                </div>
            </div>
        </div>`;
    }

    window.onload = function() { renderApp(); };
    window.setView = setView; // expose for onclick
})();
</script>
