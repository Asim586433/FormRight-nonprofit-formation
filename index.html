<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormRight · nonprofit formation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background-color: #f8fafc;
            color: #0f172a;
            line-height: 1.5;
        }
        /* modern SaaS / clean utility */
        .card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
            padding: 1.8rem;
            transition: all 0.2s;
        }
        .btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 6px -2px rgba(37,99,235,0.2);
            transition: background 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn:hover {
            background-color: #1e40af;
        }
        .btn-outline {
            background: transparent;
            color: #2563eb;
            border: 1px solid #2563eb;
            box-shadow: none;
        }
        .btn-outline:hover {
            background: #e6f0ff;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 1rem;
            background: white;
            transition: 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }
        label {
            font-weight: 500;
            margin-bottom: 0.4rem;
            display: inline-block;
            color: #334155;
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }
        .flex { display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap: 2rem; }
        .text-center { text-align: center; }
        .mt-6 { margin-top: 4rem; }
        .mb-2 { margin-bottom: 1rem; }
        .shadow-soft { box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05); }

        /* layout */
        .app-header { background: white; border-bottom: 1px solid #e9eef2; padding: 0.8rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
        .logo { font-size: 1.8rem; font-weight: 700; color: #2563eb; letter-spacing: -0.02em; }
        .badge { background: #dbeafe; color: #1e40af; padding: 0.3rem 0.9rem; border-radius: 30px; font-size: 0.9rem; font-weight: 500; }

        /* dashboard layout */
        .dash-wrapper { display: flex; min-height: 85vh; background: #f8fafc; }
        .sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; padding: 2rem 1rem; }
        .sidebar a { display: block; padding: 0.9rem 1.2rem; border-radius: 1rem; color: #334155; text-decoration: none; font-weight: 500; margin-bottom: 0.3rem; transition: 0.1s; }
        .sidebar a.active { background: #dbeafe; color: #1e40af; font-weight: 600; }
        .main-content { flex: 1; padding: 2rem; overflow-x: auto; }

        /* step forms */
        .step-indicator { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 2.5rem; }
        .step { background: white; border-radius: 40px; padding: 0.5rem 1.5rem; border: 1px solid #cbd5e1; color: #475569; }
        .step.active { background: #2563eb; color: white; border-color: #2563eb; }

        .pricing-card { background: white; border-radius: 2rem; padding: 2rem; box-shadow: 0 12px 30px rgba(0,0,0,0.03); }
        .price { font-size: 2.2rem; font-weight: 700; color: #0f172a; }

        /* simple chart bars */
        .stat-bar { display: flex; align-items: center; gap: 1rem; margin: 1rem 0; }
        .bar-fill { height: 1rem; background: #2563eb; border-radius: 30px; }

        /* modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; z-index: 999; }
        .modal-card { background: white; border-radius: 2rem; padding: 2rem; max-width: 450px; width: 90%; }

        /* table */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 1.5rem; overflow: hidden; box-shadow: 0 4px 8px #e2e8f0; }
        th { text-align: left; padding: 1rem 1.2rem; background: #f1f5f9; }
        td { padding: 1rem 1.2rem; border-bottom: 1px solid #e2e8f0; }

        /* mobile */
        @media (max-width: 700px) { .dash-wrapper { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
<!-- everything is in one file: localStorage + simulation + dummy data -->
<script>
(function() {
    // ---------- INIT STORAGE WITH DUMMY DATA ----------
    function initStorage() {
        if (!localStorage.getItem('registrations')) {
            const dummyReg = [
                { id: 'R001', orgName: 'Helping Paws', state: 'CA', email: 'paws@example.com', plan: 'DIY Document Pack — $149', paymentStatus: 'paid', board: 4, founder: 'Alice', createdAt: new Date().toISOString() },
                { id: 'R002', orgName: 'Green Future', state: 'NY', email: 'green@future.org', plan: 'Full-Service 1023-EZ — $1,199', paymentStatus: 'paid', board: 5, founder: 'Bob' }
            ];
            localStorage.setItem('registrations', JSON.stringify(dummyReg));
        }
        if (!localStorage.getItem('contacts')) {
            localStorage.setItem('contacts', JSON.stringify([
                { name: 'Jane Doe', email: 'jane@mail.com', subject: 'Pricing', message: 'Need group discount', date: new Date().toISOString() }
            ]));
        }
        if (!localStorage.getItem('payments')) {
            localStorage.setItem('payments', JSON.stringify([
                { id: 'pay_1', amount: 149, plan: 'DIY', email: 'test@example.com' }
            ]));
        }
        if (!localStorage.getItem('documents')) {
            localStorage.setItem('documents', JSON.stringify([]));
        }
    }
    initStorage();

    // current onboarding data (temporary)
    let onboardingData = {
        step: 1,
        orgName: '', state: '', orgEmail: '', phone: '',
        is501c3: 'yes', purpose: 'animal welfare', revenue: '<50000',
        founderName: '', founderAddress: '', founderEmail: '',
        boardMembers: ['', '', ''],
        mission: '', category: 'Education',
        selectedPlan: 'DIY Document Pack — $149'
    };

    // ---------- SIMPLE ROUTER / VIEW ----------
    let currentView = 'marketing'; // marketing | onboarding | client-dash | admin-dash

    function setView(view) {
        currentView = view;
        renderApp();
    }

    // admin auth simulation
    let adminAuthenticated = false;

    // ---------- RENDER FULL APP ----------
    window.renderApp = function() {
        const root = document.getElementById('root');
        if (!root) return;

        if (currentView === 'marketing') root.innerHTML = renderMarketing();
        else if (currentView === 'onboarding') root.innerHTML = renderOnboarding();
        else if (currentView === 'client-dash') root.innerHTML = renderClientDashboard();
        else if (currentView === 'admin-dash') {
            if (!adminAuthenticated) root.innerHTML = renderAdminLogin();
            else root.innerHTML = renderAdminDashboard();
        }
        attachEvents();
    };

    // ---------- EVENT HANDLER ATTACH (after each render) ----------
    function attachEvents() {
        // pricing plan buttons -> start onboarding
        document.querySelectorAll('.btn-start-onboarding').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const plan = e.target.dataset.plan || 'DIY Document Pack — $149';
                onboardingData.selectedPlan = plan;
                onboardingData.step = 1;
                setView('onboarding');
            });
        });

        // admin login
        const adminLoginBtn = document.getElementById('adminLoginBtn');
        if (adminLoginBtn) {
            adminLoginBtn.addEventListener('click', () => {
                const email = document.getElementById('adminEmail')?.value;
                const pass = document.getElementById('adminPass')?.value;
                if (email === 'admin@rightform.org' && pass === 'admin123') {
                    adminAuthenticated = true;
                    setView('admin-dash');
                } else {
                    alert('Invalid credentials (use admin@rightform.org / admin123)');
                }
            });
        }

        // logout (any)
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                adminAuthenticated = false;
                setView('marketing');
            });
        }
        const clientLogout = document.getElementById('clientLogout');
        if (clientLogout) {
            clientLogout.addEventListener('click', () => setView('marketing'));
        }

        // onboarding next/prev
        const nextStepBtn = document.getElementById('nextStep');
        const prevStepBtn = document.getElementById('prevStep');
        if (nextStepBtn) {
            nextStepBtn.addEventListener('click', () => {
                if (!validateStep(onboardingData.step)) return;
                if (onboardingData.step < 6) onboardingData.step++;
                else if (onboardingData.step === 6) {
                    processPaymentAndRegister();
                    return;
                }
                renderApp();
            });
        }
        if (prevStepBtn) {
            prevStepBtn.addEventListener('click', () => {
                if (onboardingData.step > 1) onboardingData.step--;
                renderApp();
            });
        }

        // step inputs
        document.querySelectorAll('.onboarding-input').forEach(inp => {
            inp.addEventListener('input', (e) => {
                const field = e.target.dataset.field;
                if (field) onboardingData[field] = e.target.value;
            });
        });
        // board member fields
        document.querySelectorAll('.board-input').forEach(inp => {
            inp.addEventListener('input', (e) => {
                const idx = e.target.dataset.idx;
                if (idx !== undefined) onboardingData.boardMembers[idx] = e.target.value;
            });
        });

        // contact form submit
        const contactForm = document.getElementById('contactForm');
        if (contactForm) {
            contactForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('contactName')?.value;
                const email = document.getElementById('contactEmail')?.value;
                const subj = document.getElementById('contactSubject')?.value;
                const msg = document.getElementById('contactMsg')?.value;
                if (!name || !email || !subj || !msg) return alert('fill all');
                const contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
                contacts.push({ name, email, subject: subj, message: msg, date: new Date().toISOString() });
                localStorage.setItem('contacts', JSON.stringify(contacts));
                alert('Message stored!');
                contactForm.reset();
            });
        }

        // document download simulation
        document.querySelectorAll('.download-doc').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const docName = e.target.dataset.doc || 'document';
                const regs = JSON.parse(localStorage.getItem('registrations') || '[]');
                const sample = regs[0] || { orgName: 'YourOrg', founder: 'Founder' };
                const content = `--- ${docName} ---\nOrganization: ${sample.orgName}\nFounder: ${sample.founder}\nBoard: ${sample.board || 3}\nMission: ${onboardingData.mission || 'helping'}\n(this is a dummy .docx simulation)`;
                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = docName.replace(/ /g,'_') + '.txt'; // simulate docx
                a.click();
            });
        });

        // admin: show messages, etc (dynamic)
        const loadAdminMessages = () => {
            const tbody = document.getElementById('adminMessagesBody');
            if (tbody) {
                const msgs = JSON.parse(localStorage.getItem('contacts') || '[]');
                tbody.innerHTML = msgs.map(m => `<tr><td>${m.name}</td><td>${m.email}</td><td>${m.subject}</td><td>${m.message.slice(0,30)}</td></tr>`).join('');
            }
        };
        loadAdminMessages();
        // registrations table
        const regBody = document.getElementById('registrationsTableBody');
        if (regBody) {
            const regs = JSON.parse(localStorage.getItem('registrations') || '[]');
            regBody.innerHTML = regs.map(r => `<tr><td>${r.id}</td><td>${r.orgName}</td><td>${r.plan}</td><td>${r.paymentStatus}</td></tr>`).join('');
        }

        // admin pipeline columns dummy
        // payment simulation etc
    }

    function validateStep(step) {
        // simple required checks
        if (step === 1 && (!onboardingData.orgName || !onboardingData.state || !onboardingData.orgEmail)) return alert('Fill basics'), false;
        if (step === 3 && (!onboardingData.founderName || !onboardingData.founderEmail)) return alert('Founder details required'), false;
        if (step === 4) {
            const filled = onboardingData.boardMembers.filter(b => b.trim() !== '').length;
            if (filled < 3) return alert('Add at least 3 board members'), false;
        }
        return true;
    }

    function processPaymentAndRegister() {
        const dummyCard = document.getElementById('cardNumber')?.value.replace(/\s/g,'');
        if (dummyCard !== '4242424242424242') return alert('Use test card: 4242 4242 4242 4242');
        // simulate payment success & store registration
        const regId = 'REG' + Math.floor(Math.random()*10000);
        const registration = {
            id: regId,
            orgName: onboardingData.orgName,
            state: onboardingData.state,
            email: onboardingData.orgEmail,
            founder: onboardingData.founderName,
            board: onboardingData.boardMembers,
            plan: onboardingData.selectedPlan,
            paymentStatus: 'paid',
            createdAt: new Date().toISOString()
        };
        const registrations = JSON.parse(localStorage.getItem('registrations') || '[]');
        registrations.push(registration);
        localStorage.setItem('registrations', JSON.stringify(registrations));

        // show email modal simulation
        document.getElementById('emailModalContent').innerText = 
            `To: ${onboardingData.orgEmail}\nSubject: Welcome to FormRight\n\nReceipt: paid ${
                onboardingData.selectedPlan.includes('149') ? '149' : 
                onboardingData.selectedPlan.includes('499') ? '499' : '1199'
            }\nDashboard access: click "Client dashboard"`;
        document.getElementById('emailModal').style.display = 'flex';

        // after OK go to client dashboard
        setTimeout(() => {
            document.getElementById('emailModal').style.display = 'none';
            setView('client-dash');
        }, 4000);
    }

    // ----- MARKETING PAGE -----
    function renderMarketing() {
        return `
        <div>
            <header class="app-header"><span class="logo">FormRight</span> <div><button class="btn-outline btn" onclick="setView('admin-dash')">Admin</button> <button class="btn" onclick="setView('onboarding')">Start nonprofit</button></div></header>
            <section class="container text-center" style="padding: 4rem 2rem;">
                <h1 style="font-size: 4rem; font-weight: 800; letter-spacing: -0.02em;">Start Your Nonprofit <span style="color:#2563eb">in Minutes</span></h1>
                <p style="font-size: 1.4rem; color: #334155; max-width: 700px; margin: 1.5rem auto;">FormRight helps founders create compliant nonprofits quickly.</p>
                <button class="btn" style="padding: 1rem 3rem; font-size: 1.2rem;" onclick="setView('onboarding')">Get Started →</button>
            </section>

            <div class="container grid-3">
                <div class="card"><h2>📄 DIY Document Pack</h2><p class="price">$149</p><button class="btn-start-onboarding btn" data-plan="DIY Document Pack — $149">Select</button></div>
                <div class="card"><h2>🤝 Done-With-You</h2><p class="price">$499</p><button class="btn-start-onboarding btn" data-plan="Done-With-You Formation — $499">Select</button></div>
                <div class="card"><h2>⚡ Full 1023-EZ</h2><p class="price">$1,199</p><button class="btn-start-onboarding btn" data-plan="Full-Service 1023-EZ — $1,199">Select</button></div>
                <div class="card"><h2>🏛 Full Form 1023</h2><p class="price">$3,500</p><button class="btn-start-onboarding btn" data-plan="Full Form 1023 — $3,500">Select</button></div>
                <div class="card"><h2>📬 Registered Agent</h2><p class="price">$129/yr</p><button class="btn-start-onboarding btn" data-plan="Registered Agent — $129/year">Select</button></div>
                <div class="card"><h2>⏰ Compliance</h2><p class="price">$49/yr</p><button class="btn-start-onboarding btn" data-plan="Compliance Reminders — $49/year">Select</button></div>
            </div>

            <div class="container" style="margin-top: 3rem;">
                <h2>Frequently Asked Questions</h2>
                <div class="card mt-6">❓ How long does it take? — Typically 1-2 weeks.</div>
                <h2 class="mt-6">Contact</h2>
                <form id="contactForm" class="card" style="max-width:600px;">
                    <label>Name</label><input id="contactName" required>
                    <label>Email</label><input id="contactEmail" type="email" required>
                    <label>Subject</label><input id="contactSubject" required>
                    <label>Message</label><textarea id="contactMsg" rows="3"></textarea>
                    <button class="btn" type="submit">Send</button>
                </form>
            </div>
            <footer class="container" style="padding:2rem;">© FormRight — footer </footer>
        </div>`;
    }

    function renderOnboarding() {
        const s = onboardingData.step;
        let stepHtml = '';
        if (s===1) stepHtml = `<h3>Step 1: Basics</h3><label>Org Name</label><input class="onboarding-input" data-field="orgName" value="${onboardingData.orgName}"><label>State</label><input class="onboarding-input" data-field="state" value="${onboardingData.state}"><label>Email</label><input class="onboarding-input" data-field="orgEmail" value="${onboardingData.orgEmail}"><label>Phone</label><input class="onboarding-input" data-field="phone" value="${onboardingData.phone}">`;
        if (s===2) stepHtml = `<h3>Eligibility</h3><label>501(c)(3)?</label><select class="onboarding-input" data-field="is501c3"><option>yes</option><option>no</option></select><label>Charitable purpose</label><input class="onboarding-input" data-field="purpose" value="${onboardingData.purpose}"><label>Expected revenue</label><select class="onboarding-input" data-field="revenue"><option><50000</option><option>50000-200k</option></select>`;
        if (s===3) stepHtml = `<h3>Founder</h3><label>Full name</label><input class="onboarding-input" data-field="founderName" value="${onboardingData.founderName}"><label>Address</label><input class="onboarding-input" data-field="founderAddress" value="${onboardingData.founderAddress}"><label>Email</label><input class="onboarding-input" data-field="founderEmail" value="${onboardingData.founderEmail}">`;
        if (s===4) {
            let boardInputs = '';
            onboardingData.boardMembers.forEach((name,idx) => { boardInputs += `<label>Board member ${idx+1}</label><input class="board-input" data-idx="${idx}" value="${name}">`; });
            stepHtml = `<h3>Board (min 3)</h3>${boardInputs}`;
        }
        if (s===5) stepHtml = `<h3>Details</h3><label>Mission statement</label><input class="onboarding-input" data-field="mission" value="${onboardingData.mission}"><label>Category</label><input class="onboarding-input" data-field="category" value="${onboardingData.category}">`;
        if (s===6) stepHtml = `<h3>Payment</h3><p>Plan: <strong>${onboardingData.selectedPlan}</strong></p><label>Card number (4242 4242 4242 4242)</label><input id="cardNumber" placeholder="4242 4242 4242 4242"><label>Expiry / CVV (any)</label><div class="flex"><input placeholder="MM/YY"><input placeholder="123"></div><p class="badge">Test card only</p>`;

        return `
        <div class="app-header"><span class="logo">FormRight onboarding</span> <button class="btn-outline" onclick="setView('marketing')">Exit</button></div>
        <div class="container" style="max-width:700px;">
            <div class="step-indicator">${[1,2,3,4,5,6].map(i=>`<span class="step ${i===s?'active':''}">${i}</span>`).join('')}</div>
            <div class="card">${stepHtml}
                <div style="display:flex;justify-content:space-between;margin-top:2rem;">
                    <button class="btn-outline" id="prevStep" ${s===1?'disabled':''}>Previous</button>
                    <button class="btn" id="nextStep">${s===6?'Pay & Finish':'Next'}</button>
                </div>
            </div>
        </div>`;
    }

    function renderClientDashboard() {
        const regs = JSON.parse(localStorage.getItem('registrations') || '[]');
        const myReg = regs[regs.length-1] || { orgName: 'Demo org', plan: 'DIY', founder:'You' };
        return `
        <div class="app-header"><span class="logo">👤 ${myReg.orgName}</span> <button class="btn-outline" id="clientLogout">Logout</button></div>
        <div class="dash-wrapper">
            <div class="sidebar">
                <a class="active">📋 Overview</a><a>📄 Documents</a><a>🏢 Organization</a><a>👥 Board</a><a>💰 Payments</a><a>❓ Support</a><a>⚙️ Settings</a>
                <button class="btn" style="margin-top:2rem;" onclick="setView('marketing')">← Home</button>
            </div>
            <div class="main-content">
                <h2>Your dashboard</h2>
                <div class="grid-3">
                    <div class="card"><h3>Documents ready</h3>
                        <ul style="list-style:none;">${['Articles','Bylaws','Conflict of Interest','IRS SS4','Minutes','Checklist'].map(d=>`<li><button class="btn-outline download-doc" data-doc="${d}" style="padding:0.3rem 1rem; margin:0.2rem">📎 ${d}</button></li>`).join('')}
                    </div>
                    <div class="card"><h3>Plan: ${myReg.plan}</h3><p>status: active</p></div>
                    <div class="card"><h3>Support</h3><p>Message us anytime</p></div>
                </div>
            </div>
        </div>`;
    }

    function renderAdminLogin() {
        return `<div class="container" style="max-width:400px; margin:10vh auto;"><div class="card"><h2>Admin login</h2><label>Email</label><input id="adminEmail" value="admin@rightform.org"><label>Password</label><input id="adminPass" type="password" value="admin123"><button class="btn" id="adminLoginBtn" style="margin-top:1.5rem;">Sign in</button></div></div>`;
    }

    function renderAdminDashboard() {
        const regs = JSON.parse(localStorage.getItem('registrations') || '[]');
        const contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
        const revenue = regs.length * 500; // dummy

        return `
        <div class="app-header"><span class="logo">Admin</span><button id="logoutBtn" class="btn-outline">Logout</button></div>
        <div class="dash-wrapper">
            <div class="sidebar"><a class="active">📊 Dashboard</a><a>📋 Registrations</a><a>🔄 Pipeline</a><a>💳 Payments</a><a>✉️ Messages</a><a>📈 Analytics</a></div>
            <div class="main-content">
                <div class="flex"><div class="card">Total reg: ${regs.length}</div><div class="card">Revenue: $${revenue}</div><div class="card">Popular: DIY</div></div>
                <h3>Recent registrations</h3>
                <table><thead><tr><th>ID</th><th>Org</th><th>Plan</th><th>Status</th></tr></thead><tbody id="registrationsTableBody"></tbody></table>
                <h3 class="mt-6">Pipeline</h3><div class="flex">
                    <div class="card">🆕 New intake (2)</div><div class="card">💳 Paid (${regs.length})</div><div class="card">📄 Docs gen (1)</div><div class="card">✅ Completed (0)</div>
                </div>
                <h3 class="mt-6">Contact messages</h3>
                <table><thead><tr><th>Name</th><th>Email</th><th>Subject</th><th>Message</th></tr></thead><tbody id="adminMessagesBody"></tbody></table>

                <div class="card mt-6"><h3>Analytics (simple)</h3><div class="stat-bar">DIY: <div class="bar-fill" style="width:60%;">60%</div></div><div class="stat-bar">1023-EZ: <div class="bar-fill" style="width:30%;">30%</div></div></div>
            </div>
        </div>`;
    }

    window.onload = function() { renderApp(); };
})();
</script>

<body>
<div id="root" class="app-root">Loading FormRight...</div>

<!-- email modal -->
<div id="emailModal" class="modal" style="display:none;">
    <div class="modal-card">
        <h3>📧 Email simulation</h3>
        <p id="emailModalContent">Payment success email with receipt & dashboard access</p>
        <button class="btn" onclick="document.getElementById('emailModal').style.display='none'">Close</button>
    </div>
</div>

<script>
    // re-attach events after each render (already inside renderApp)
